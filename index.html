<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヤマ管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f2f2f7; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 16px; }
h2 { font-size: 22px; font-weight: 700; margin-bottom: 14px; color: #1c1c1e; }
.tab-bar { display: flex; background: #e5e5ea; border-radius: 10px; padding: 2px; margin-bottom: 18px; }
.tab { flex: 1; text-align: center; padding: 7px 0; font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; color: #888; }
.tab.active { background: #fff; color: #1c1c1e; }
.date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.date-btn { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 6px 16px; font-size: 16px; cursor: pointer; }
.date-label { flex: 1; text-align: center; font-size: 15px; font-weight: 600; color: #1c1c1e; }
.scores { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.score-card { background: #fff; border-radius: 14px; padding: 14px; text-align: center; }
.score-name { font-size: 13px; color: #888; margin-bottom: 4px; }
.score-val { font-size: 30px; font-weight: 700; color: #1c1c1e; }
.score-val.pos { color: #34c759; }
.score-val.neg { color: #ff3b30; }
.sec-title { font-size: 12px; color: #888; font-weight: 600; margin: 0 0 8px; letter-spacing: 0.5px; }
.item { display: flex; align-items: center; background: #fff; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; gap: 8px; }
.item-name { flex: 1; font-size: 14px; color: #1c1c1e; }
.item-pts { font-size: 11px; color: #aaa; text-align: right; min-width: 100px; }
.chk { width: 36px; height: 36px; border-radius: 50%; border: 1px solid #ddd; background: #f2f2f7; cursor: pointer; font-size: 14px; font-weight: 700; flex-shrink: 0; color: #aaa; }
.chk.on { background: #e8f8ef; border-color: #34c759; color: #34c759; }
.chk.off2 { background: #ffeeed; border-color: #ff3b30; color: #ff3b30; }
.log-box { background: #fff; border-radius: 12px; padding: 12px; min-height: 60px; margin-bottom: 30px; }
.log-row { display: flex; justify-content: space-between; font-size: 13px; color: #444; padding: 5px 0; border-bottom: 1px solid #f2f2f7; }
.log-row:last-child { border-bottom: none; }
.badge { display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 20px; margin-right: 6px; }
.badge.plus { background: #e8f8ef; color: #1a7a3a; }
.badge.minus { background: #ffeeed; color: #c0392b; }
.empty { text-align: center; color: #bbb; font-size: 13px; padding: 10px 0; }

/* 管理画面 */
.admin-section { background: #fff; border-radius: 14px; padding: 16px; margin-bottom: 14px; }
.admin-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #1c1c1e; }
.admin-item { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f2f2f7; }
.admin-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.admin-item-name { flex: 1; font-size: 14px; color: #1c1c1e; }
.pt-input { width: 60px; border: 1px solid #ddd; border-radius: 8px; padding: 5px 8px; font-size: 14px; text-align: center; }
.pt-label { font-size: 11px; color: #888; width: 24px; text-align: center; }
.del-btn { width: 30px; height: 30px; border-radius: 50%; background: #ffeeed; border: none; color: #ff3b30; font-size: 18px; cursor: pointer; font-weight: 700; flex-shrink: 0; }
.add-row { display: flex; gap: 8px; margin-top: 12px; }
.add-input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 14px; }
.add-btn { background: #007aff; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer; }
.save-btn { width: 100%; background: #34c759; color: #fff; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
.member-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.member-input { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px 10px; font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <h2 id="appTitle">ヤマ管理</h2>
  <div class="tab-bar">
    <div class="tab active" onclick="showTab('check')">チェック</div>
    <div class="tab" onclick="showTab('admin')">管理</div>
  </div>

  <!-- チェック画面 -->
  <div id="checkPage">
    <div class="date-row">
      <button class="date-btn" onclick="changeDay(-1)">◀</button>
      <div class="date-label" id="dateLabel"></div>
      <button class="date-btn" onclick="changeDay(1)">▶</button>
    </div>
    <div class="scores" id="scores"></div>
    <div class="sec-title">チェック項目</div>
    <div id="itemList"></div>
    <div class="sec-title" style="margin-top:18px">本日の記録</div>
    <div class="log-box" id="logBox"><div class="empty">まだチェックがありません</div></div>
  </div>

  <!-- 管理画面 -->
  <div id="adminPage" style="display:none">
    <div class="admin-section">
      <h3>メンバー名</h3>
      <div id="memberInputs"></div>
    </div>
    <div class="admin-section">
      <h3>チェック項目・ポイント</h3>
      <div id="adminItems"></div>
      <div class="add-row">
        <input class="add-input" id="newItemName" placeholder="新しい項目名">
        <input class="pt-input" id="newPt0" placeholder="0" type="number" step="0.5">
        <input class="pt-input" id="newPt1" placeholder="0" type="number" step="0.5">
        <button class="add-btn" onclick="addItem()">追加</button>
      </div>
    </div>
    <button class="save-btn" onclick="saveSettings()">保存する</button>
  </div>
</div>

<script>
const DAYS=['日','月','火','水','木','金','土'];
let cur=new Date();
let db={};

// 設定をlocalStorageから読み込み
let settings = JSON.parse(localStorage.getItem('yamaSettings') || 'null') || {
  members: ['敬助','真之'],
  items: [
    {n:'基本給', p:[6,1]},
    {n:'スマホ', p:[-4,-2]},
    {n:'ゲーム', p:[-1,-1]},
    {n:'テレビ', p:[-1,-1]},
    {n:'服脱ぎっぱなし', p:[-0.5,-0.5]},
    {n:'塾', p:[1,0.5]},
    {n:'宿題', p:[1,1]},
    {n:'自主練', p:[1,1]},
    {n:'起床', p:[1,1]},
    {n:'就寝', p:[1,1]},
    {n:'食事45分', p:[1,1]},
    {n:'遅刻', p:[-2,-1]},
  ]
};

function saveToLocal() {
  localStorage.setItem('yamaSettings', JSON.stringify(settings));
}

function dk(d){return d.toISOString().slice(0,10);}
function fmt(d){return (d.getMonth()+1)+'月'+d.getDate()+'日（'+DAYS[d.getDay()]+'）';}
function get(){let k=dk(cur);if(!db[k])db[k]={};return db[k];}
function changeDay(n){cur=new Date(cur);cur.setDate(cur.getDate()+n);renderCheck();}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', (i===0&&tab==='check')||(i===1&&tab==='admin')));
  document.getElementById('checkPage').style.display = tab==='check'?'':'none';
  document.getElementById('adminPage').style.display = tab==='admin'?'':'none';
  if(tab==='admin') renderAdmin();
}

function renderCheck(){
  document.getElementById('dateLabel').textContent=fmt(cur);
  let s=get(), sc=settings.members.map(()=>0), logs=[];
  settings.items.forEach((item,ii)=>{
    settings.members.forEach((_,mi)=>{
      let v=s[ii+'_'+mi];
      if(v===1){sc[mi]+=item.p[mi];logs.push({m:settings.members[mi],n:item.n,p:item.p[mi]});}
    });
  });

  // スコアカード
  let scDiv=document.getElementById('scores');
  scDiv.innerHTML='';
  settings.members.forEach((m,mi)=>{
    let v=sc[mi];
    scDiv.innerHTML+=`<div class="score-card"><div class="score-name">${m}</div><div class="score-val${v>0?' pos':v<0?' neg':''}">${v>0?'+':''}${v}pt</div></div>`;
  });

  // チェックリスト
  let list=document.getElementById('itemList');
  list.innerHTML='';
  settings.items.forEach((item,ii)=>{
    let div=document.createElement('div');
    div.className='item';
    let pts=settings.members.map((m,mi)=>m[0]+':'+(item.p[mi]>0?'+':'')+item.p[mi]).join(' / ')+'pt';
    div.innerHTML='<span class="item-name">'+item.n+'</span><span class="item-pts">'+pts+'</span>';
    settings.members.forEach((_,mi)=>{
      let v=s[ii+'_'+mi];
      let b=document.createElement('button');
      b.className='chk'+(v===1?' on':v===-1?' off2':'');
      b.textContent=v===1?'✓':v===-1?'✗':settings.members[mi][0];
      b.onclick=()=>{
        let cur_v=get()[ii+'_'+mi];
        if(cur_v===undefined)get()[ii+'_'+mi]=1;
        else if(cur_v===1)get()[ii+'_'+mi]=-1;
        else delete get()[ii+'_'+mi];
        renderCheck();
      };
      div.appendChild(b);
    });
    list.appendChild(div);
  });

  // ログ
  let lb=document.getElementById('logBox');
  if(!logs.length){lb.innerHTML='<div class="empty">まだチェックがありません</div>';return;}
  lb.innerHTML=logs.map(l=>'<div class="log-row"><span><span class="badge '+(l.p>=0?'plus':'minus')+'">'+l.m+'</span>'+l.n+'</span><span style="font-weight:600;color:'+(l.p>=0?'#34c759':'#ff3b30')+'">'+(l.p>0?'+':'')+l.p+'pt</span></div>').join('');
}

function renderAdmin(){
  // メンバー
  let mDiv=document.getElementById('memberInputs');
  mDiv.innerHTML=settings.members.map((m,i)=>`
    <div class="member-row">
      <span style="font-size:13px;color:#888;min-width:60px">メンバー${i+1}</span>
      <input class="member-input" id="mName${i}" value="${m}">
    </div>`).join('');

  // 項目
  let aDiv=document.getElementById('adminItems');
  aDiv.innerHTML=settings.items.map((item,ii)=>`
    <div class="admin-item" id="aitem${ii}">
      <input style="flex:1;border:1px solid #ddd;border-radius:8px;padding:5px 8px;font-size:14px" id="iname${ii}" value="${item.n}">
      <span class="pt-label">${settings.members[0]?settings.members[0][0]:'1'}:</span>
      <input class="pt-input" id="ip0_${ii}" value="${item.p[0]}" type="number" step="0.5">
      <span class="pt-label">${settings.members[1]?settings.members[1][0]:'2'}:</span>
      <input class="pt-input" id="ip1_${ii}" value="${item.p[1]}" type="number" step="0.5">
      <button class="del-btn" onclick="deleteItem(${ii})">×</button>
    </div>`).join('');
}

function deleteItem(ii){
  if(!confirm('「'+settings.items[ii].n+'」を削除しますか？')) return;
  settings.items.splice(ii,1);
  saveToLocal();
  renderAdmin();
}

function addItem(){
  let name=document.getElementById('newItemName').value.trim();
  let p0=parseFloat(document.getElementById('newPt0').value)||0;
  let p1=parseFloat(document.getElementById('newPt1').value)||0;
  if(!name){alert('項目名を入力してください');return;}
  settings.items.push({n:name,p:[p0,p1]});
  document.getElementById('newItemName').value='';
  document.getElementById('newPt0').value='';
  document.getElementById('newPt1').value='';
  saveToLocal();
  renderAdmin();
}

function saveSettings(){
  // メンバー名保存
  settings.members=settings.members.map((_,i)=>document.getElementById('mName'+i).value.trim()||settings.members[i]);
  // 項目保存
  settings.items=settings.items.map((item,ii)=>({
    n: document.getElementById('iname'+ii).value.trim()||item.n,
    p: [
      parseFloat(document.getElementById('ip0_'+ii).value)||0,
      parseFloat(document.getElementById('ip1_'+ii).value)||0
    ]
  }));
  saveToLocal();
  alert('保存しました！');
  showTab('check');
  renderCheck();
}

renderCheck();
</script>
</body>
</html>
